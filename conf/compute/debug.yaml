# @package _global_
# Short slurm allocation for quick smoke tests on a small GPU.
defaults:
  - override /hydra/launcher: slurm

run_mode: debug

hydra:
  mode: MULTIRUN
  launcher:
    timeout_min: 30
    gpus_per_node: 1
    cpus_per_task: 4
    mem_gb: 32
    partition: rtx_3090_submit,rtx_2080_submit,gtx_1080_submit
